server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

query_frontend:
  metrics:
    max_duration: 24h

metrics_generator:
  storage:
    path: /var/tempo/generator/wal
  traces_storage:
    path: /var/tempo/generator/traces
  processor:
    local_blocks:
      max_live_traces: 50000
      flush_check_period: 500ms
      trace_idle_period: 10s
      complete_block_timeout: 15m

overrides:
  defaults:
    metrics_generator:
      processors: [local-blocks]
